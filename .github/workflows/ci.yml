name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Opt JS-based actions (checkout, setup-python) into the Node 24 runtime
  # ahead of the June 2026 deprecation of Node 20. Silences the runner warning.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    env:
      # Dev settings use SQLite + LocMemCache + eager Celery, so no external
      # Postgres/Redis services are required to run the suite in CI.
      DJANGO_SETTINGS_MODULE: config.settings.development
      DJANGO_SECRET_KEY: ci-insecure-key-not-used-in-prod
      DEBUG: "True"
      SITE_DOMAIN: 127.0.0.1:8000
      SITE_SCHEME: http

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies (WeasyPrint)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf-2.0-0 \
            libffi-dev libcairo2

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check formatting (black)
        run: black --check .

      - name: Check import order (isort)
        run: isort --check-only .

      - name: Lint (flake8)
        run: flake8 .

      - name: Check for missing migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run tests
        run: pytest --cov=apps --cov-report=term-missing
