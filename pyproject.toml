[tool.black]
line-length = 100
target-version = ["py311"]
exclude = '''
/(
  \.git
  | \.venv
  | migrations
  | staticfiles
)/
'''

[tool.isort]
profile = "black"
line_length = 100
known_first_party = ["apps", "config"]
known_django = ["django"]
sections = ["FUTURE", "STDLIB", "DJANGO", "THIRDPARTY", "FIRSTPARTY", "LOCALFOLDER"]
skip = ["migrations", "staticfiles", "media"]
skip_glob = [".venv/*", "venv/*", "env/*"]
extend_skip = [".venv"]
