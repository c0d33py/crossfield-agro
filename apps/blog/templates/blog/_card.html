<!--
Reusable post card. Expects context: post
-->
<article class="card card--accent">
  {% if post.hero_image %}
    <a href="{{ post.get_absolute_url }}" style="display: block; margin: -24px -24px 16px;">
      <img src="{{ post.hero_image.url }}"
           alt="{{ post.hero_alt|default:post.title }}"
           loading="lazy" width="400" height="225"
           style="aspect-ratio: 16/9; object-fit: cover; width: 100%; border-radius: 8px 8px 0 0;">
    </a>
  {% endif %}
  <p class="eyebrow">
    {% for tag in post.tags.all|slice:":2" %}
      <a href="{{ tag.get_absolute_url }}" style="color: inherit; text-decoration: none;">{{ tag.name }}</a>{% if not forloop.last %} · {% endif %}
    {% endfor %}
  </p>
  <h3 style="margin-bottom: 8px;">
    <a href="{{ post.get_absolute_url }}" style="color: var(--color-green-900); text-decoration: none;">
      {{ post.title }}
    </a>
  </h3>
  <p>{{ post.excerpt }}</p>
  <p class="help" style="margin: 12px 0 0;">
    <a href="{{ post.author.get_absolute_url }}" style="color: var(--color-muted);">{{ post.author.name }}</a>
    · <time datetime="{{ post.published_at|date:'c' }}">{{ post.published_at|date:"j M Y" }}</time>
  </p>
</article>
